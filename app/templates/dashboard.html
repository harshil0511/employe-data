<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Core Employee Dashboard | Admin Portal</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome (for icons) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Custom CSS -->
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>

    <!-- Sidebar -->
    <aside class="sidebar">
        <div class="sidebar-logo">
            <i class="fa-solid fa-layer-group"></i> CoreHub
        </div>
        
        <nav>
            <div class="nav-item active" onclick="window.loadCompaniesView()" id="navCompanies">
                <i class="fa-solid fa-city"></i> Companies
            </div>
            <div class="nav-item" onclick="window.loadEmployeesView()" id="navEmployees">
                <i class="fa-solid fa-users"></i> Employees
            </div>
            <div class="nav-item">
                <i class="fa-solid fa-chart-line"></i> Analytics
            </div>
            <div class="nav-item">
                <i class="fa-solid fa-gear"></i> Settings
            </div>
            <div class="nav-item" onclick="window.loadLogsView()" id="navLogs">
                <i class="fa-solid fa-list-check"></i> Audit Logs
            </div>
        </nav>

        <div class="db-status">
            <div class="status-dot"></div>
            <span>Database: Connected</span>
        </div>
    </aside>

    <!-- Main Content -->
    <main class="main-content">
        <header>
            <div>
                <h1 id="mainTitle">Dashboard Overview</h1>
                <p style="color: var(--text-secondary); font-size: 0.875rem;">Manage your organization data effortlessly.</p>
            </div>
            <button class="btn btn-primary" id="addBtn" onclick="openAddModal()">
                <i class="fa-solid fa-plus"></i> Add New
            </button>
        </header>

        <!-- Stats Grid -->
        <div class="stats-grid" id="statsGrid">
            <!-- Dynamically injected -->
        </div>

        <!-- Top 5 Section -->
        <div id="top5Section" class="top5-section">
            <div class="table-container top5-container">
                <div class="top5-header">
                    <h3><i class="fa-solid fa-trophy" style="color: #fbbf24; margin-right: 0.5rem;"></i> Top 5 Companies (Max Salary Employee)</h3>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Company</th>
                            <th>Top Employee</th>
                            <th>Salary</th>
                        </tr>
                    </thead>
                    <tbody id="top5Body">
                        <!-- Dynamically injected -->
                        <tr>
                            <td colspan="3" style="text-align: center; padding: 2rem; color: var(--text-secondary);">Loading ranking data...</td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Filter Area (Employees only) -->
        <div class="company-selector" id="companySelector" style="display: none;">
            <!-- Dynamically injected company chips -->
        </div>

        <!-- Data Table -->
        <div class="table-container">
            <table>
                <thead id="dataHeader">
                    <!-- Dynamically injected -->
                </thead>
                <tbody id="dataTable">
                    <!-- Dynamically injected -->
                </tbody>
            </table>
        </div>
    </main>

    <!-- CRUD Modal -->
    <div class="modal" id="crudModal">
        <div class="modal-content">
            <div class="modal-header">
                <span id="modalTitle">Add Data</span>
                <span style="float: right; cursor: pointer; color: var(--text-secondary);" onclick="hideModal()">&times;</span>
            </div>
            <form id="crudForm">
                <div id="formFields">
                    <!-- Dynamically injected -->
                </div>
                <div style="display: flex; gap: 1rem; margin-top: 2rem;">
                    <button type="submit" class="btn btn-primary" style="flex: 1; justify-content: center;">Save Changes</button>
                    <button type="button" class="btn btn-danger" style="flex: 1; justify-content: center;" onclick="hideModal()">Cancel</button>
                </div>
            </form>
        </div>
    </div>

    <!-- Custom JS -->
    <script src="/static/js/dashboard.js"></script>
    
    <script>
        // Highlighting active nav item
        document.querySelectorAll('.nav-item').forEach(item => {
            item.addEventListener('click', () => {
                document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
                item.classList.add('active');
            });
        });
    </script>
</body>
</html>
